<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduPulse | Student Management System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ==========================================================================
           CSS STYLE CODES
           ========================================================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            color: #333;
        }

        .app-container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Design */
        .sidebar {
            width: 260px;
            background-color: #1e293b;
            color: #fff;
            padding: 20px;
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.1rem;
            margin-bottom: 40px;
            color: #38bdf8;
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-menu li {
            margin-bottom: 8px;
        }

        .sidebar-menu a {
            display: flex;
            align-items: center;
            gap: 15px;
            color: #94a3b8;
            text-decoration: none;
            padding: 12px 15px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .sidebar-menu li.active a, .sidebar-menu a:hover {
            background-color: #334155;
            color: #fff;
        }

        /* Layout Framework */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* Header Layout */
        .top-header {
            background-color: #fff;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            border-bottom: 1px solid #e2e8f0;
        }

        .search-bar-container {
            display: flex;
            align-items: center;
            background-color: #f1f5f9;
            padding: 8px 15px;
            border-radius: 8px;
            width: 350px;
            gap: 10px;
        }

        .search-bar-container input {
            border: none;
            background: transparent;
            outline: none;
            width: 100%;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .notification-icon {
            font-size: 1.2rem;
            cursor: pointer;
            color: #64748b;
        }

        .user-avatar {
            width: 35px;
            height: 35px;
            background-color: #3b82f6;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* Metrics Dash Cards */
        .analytics-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 25px;
            padding: 30px;
        }

        .card {
            background-color: #fff;
            border-radius: 12px;
            padding: 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .card-icon {
            font-size: 2rem;
            padding: 15px;
            border-radius: 10px;
        }

        .card-blue .card-icon { background: #eff6ff; color: #2563eb; }
        .card-green .card-icon { background: #f0fdf4; color: #16a34a; }
        .card-orange .card-icon { background: #fff7ed; color: #ea580c; }

        .card-info h3 { font-size: 1.8rem; font-weight: 700; }
        .card-info p { color: #64748b; font-size: 0.9rem; }

        /* Data Grid Table styling */
        .data-section {
            padding: 0 30px 30px 30px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .table-container {
            background-color: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        .data-table th {
            background-color: #f8fafc;
            color: #64748b;
            padding: 15px 20px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #e2e8f0;
        }

        .data-table td {
            padding: 15px 20px;
            border-bottom: 1px solid #f1f5f9;
        }

        /* Status UI Labels */
        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .badge-active { background-color: #dcfce7; color: #15803d; }
        .badge-suspended { background-color: #fee2e2; color: #b91c1c; }
        .badge-graduated { background-color: #e0f2fe; color: #0369a1; }

        /* Operation Buttons */
        .btn {
            padding: 10px 18px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary { background-color: #3b82f6; color: #fff; }
        .btn-primary:hover { background-color: #2563eb; }
        .btn-secondary { background-color: #e2e8f0; color: #334155; }

        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            margin-right: 10px;
        }
        .edit-icon { color: #3b82f6; }
        .delete-icon { color: #ef4444; }

        /* Window Modal Popup Layout */
        .modal-overlay {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(15, 23, 42, 0.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }

        .modal-box {
            background: white;
            width: 450px;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .close-btn {
            font-size: 1.8rem;
            background: none;
            border: none;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #475569;
            margin-bottom: 6px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            outline: none;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: #3b82f6;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 25px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <nav class="sidebar">
            <div class="sidebar-brand">
                <i class="fa-solid fa-graduation-cap"></i>
                <h2>EduPulse</h2>
            </div>
            <ul class="sidebar-menu">
                <li class="active"><a href="#"><i class="fa-solid fa-chart-pie"></i> Dashboard</a></li>
                <li><a href="#"><i class="fa-solid fa-user-graduate"></i> Students</a></li>
                <li><a href="#"><i class="fa-solid fa-book"></i> Courses</a></li>
                <li><a href="#"><i class="fa-solid fa-credit-card"></i> Fees Management</a></li>
                <li><a href="#"><i class="fa-solid fa-gear"></i> Settings</a></li>
            </ul>
        </nav>

        <main class="main-content">
            
            <header class="top-header">
                <div class="search-bar-container">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="globalSearch" placeholder="Search students by name, ID, or email..." onkeyup="searchStudents()">
                </div>
                <div class="user-profile">
                    <i class="fa-regular fa-bell notification-icon"></i>
                    <div class="user-avatar">A</div>
                    <span>Admin Portal</span>
                </div>
            </header>

            <section class="analytics-container">
                <div class="card card-blue">
                    <div class="card-icon"><i class="fa-solid fa-users"></i></div>
                    <div class="card-info">
                        <h3 id="totalStudents">0</h3>
                        <p>Total Students</p>
                    </div>
                </div>
                <div class="card card-green">
                    <div class="card-icon"><i class="fa-solid fa-circle-check"></i></div>
                    <div class="card-info">
                        <h3 id="activeStudents">0</h3>
                        <p>Active Enrollment</p>
                    </div>
                </div>
                <div class="card card-orange">
                    <div class="card-icon"><i class="fa-solid fa-award"></i></div>
                    <div class="card-info">
                        <h3>A+</h3>
                        <p>Average Performance</p>
                    </div>
                </div>
            </section>

            <section class="data-section">
                <div class="section-header">
                    <h2>Student Registry Records</h2>
                    <button class="btn btn-primary" onclick="openModal()"><i class="fa-solid fa-plus"></i> Add New Student</button>
                </div>

                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Student ID</th>
                                <th>Full Name</th>
                                <th>Email Address</th>
                                <th>Course/Major</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="studentTableBody">
                            </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <div class="modal-overlay" id="studentModal">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="modalTitle">Register New Student</h3>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <form id="studentForm" onsubmit="saveStudent(event)">
                <input type="hidden" id="studentIndex">
                
                <div class="form-group">
                    <label for="studentId">Roll Number/ID</label>
                    <input type="text" id="studentId" required placeholder="e.g., STU1024">
                </div>
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" required placeholder="e.g., John Doe">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="e.g., john@university.com">
                </div>
                <div class="form-group">
                    <label for="course">Course Field</label>
                    <select id="course" required>
                        <option value="">-- Select Course --</option>
                        <option value="Computer Science Engineering">Computer Science Engineering</option>
                        <option value="Information Technology">Information Technology</option>
                        <option value="Data Science & AI">Data Science & AI</option>
                        <option value="Business Administration">Business Administration</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="status">Enrollment Status</label>
                    <select id="status" required>
                        <option value="Active">Active</option>
                        <option value="Suspended">Suspended</option>
                        <option value="Graduated">Graduated</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Memory State initialization tracking array
        let students = JSON.parse(localStorage.getItem('students')) || [
            { id: "STU101", name: "Kalyan Kumar", email: "kalyan@university.com", course: "Computer Science Engineering", status: "Active" },
            { id: "STU102", name: "Anjali Sharma", email: "anjali@university.com", course: "Data Science & AI", status: "Active" },
            { id: "STU103", name: "Rahul Verma", email: "rahul@university.com", course: "Business Administration", status: "Graduated" }
        ];

        // Init App On Windows Load Complete
        document.addEventListener("DOMContentLoaded", () => {
            renderStudents(students);
        });

        // Dynamic Table Row Generator Core Function
        function renderStudents(dataArray) {
            const tableBody = document.getElementById("studentTableBody");
            tableBody.innerHTML = "";

            dataArray.forEach((student, index) => {
                const row = `
                    <tr>
                        <td><strong>#${student.id}</strong></td>
                        <td>${student.name}</td>
                        <td>${student.email}</td>
                        <td>${student.course}</td>
                        <td><span class="badge badge-${student.status.toLowerCase()}">${student.status}</span></td>
                        <td>
                            <button class="action-btn edit-icon" onclick="editStudent(${index})"><i class="fa-solid fa-pen-to-square"></i></button>
                            <button class="action-btn delete-icon" onclick="deleteStudent(${index})"><i class="fa-solid fa-trash"></i></button>
                        </td>
                    </tr>
                `;
                tableBody.innerHTML += row;
            });

            updateMetricsCounters();
        }

        // Analytical Calculations Calculation Function
        function updateMetricsCounters() {
            document.getElementById("totalStudents").innerText = students.length;
            const activeCount = students.filter(s => s.status === "Active").length;
            document.getElementById("activeStudents").innerText = activeCount;
        }

        // Form View Screen Toggles
        function openModal() {
            document.getElementById("studentModal").style.display = "flex";
            document.getElementById("modalTitle").innerText = "Register New Student";
            document.getElementById("studentForm").reset();
            document.getElementById("studentIndex").value = "";
        }

        function closeModal() {
            document.getElementById("studentModal").style.display = "none";
        }

        // Data Management Form Save Router (Create & Update Handler)
        function saveStudent(event) {
            event.preventDefault();

            const index = document.getElementById("studentIndex").value;
            const newStudent = {
                id: document.getElementById("studentId").value.trim(),
                name: document.getElementById("fullName").value.trim(),
                email: document.getElementById("email").value.trim(),
                course: document.getElementById("course").value,
                status: document.getElementById("status").value
            };

            if (index === "") {
                // Create logic route
                students.push(newStudent);
            } else {
                // Update logic route
                students[index] = newStudent;
            }

            // Sync structural changes into the browser storage state
            localStorage.setItem('students', JSON.stringify(students));
            renderStudents(students);
            closeModal();
        }

        // Populate Form Values for Record Updates
        function editStudent(index) {
            openModal();
            document.getElementById("modalTitle").innerText = "Edit Student Profile Record";
            
            const target = students[index];
            document.getElementById("studentIndex").value = index;
            document.getElementById("studentId").value = target.id;
            document.getElementById("fullName").value = target.name;
            document.getElementById("email").value = target.email;
            document.getElementById("course").value = target.course;
            document.getElementById("status").value = target.status;
        }

        // Remove Profile Action Routine
        function deleteStudent(index) {
            if(confirm("Are you absolutely sure you want to remove this student record permanently?")) {
                students.splice(index, 1);
                localStorage.setItem('students', JSON.stringify(students));
                renderStudents(students);
            }
        }

        // Data Entry Input Filtering Logic
        function searchStudents() {
            const searchVal = document.getElementById("globalSearch").value.toLowerCase();
            const filteredArray = students.filter(student => {
                return student.name.toLowerCase().includes(searchVal) || 
                       student.id.toLowerCase().includes(searchVal) || 
                       student.email.toLowerCase().includes(searchVal);
            });
            renderStudents(filteredArray);
        }
    </script>
</body>
</html>
